<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CraftShop - Фермы">
  <link rel="stylesheet" href="./styles/farms.css">
  <title>CraftShop - Фермы</title>
</head>
<body onload="loadingFunc()">
  <div class="loader"></div>
  <div class="container">
    <div class="head">
      <h1 class="name">Craft<span class="purple">Shop</span></h1>
      <h2 class="slogan">Магазин игровых построек</h2>
      <ul class="breadcrumb">
        <li><a href="../index.html">Главная</a></li>
        <li>Фермы</li>
      </ul>
    </div>
    <div class="cards">
      <div class="card iron">
        <div class="img">
          <img src="../images/iron.png" style="width: 200px;" alt="Enderman">
        </div>
        <div class="name">
          <h1 class="card-name">Ферма Железо</h1>
        </div>
      </div>
      <div class="card gold">
        <div class="img">
          <img src="../images/gold.png" style="width: 120px;" alt="Enderman">
        </div>
        <div class="name">
          <h1 class="card-name">Ферма Золота</h1>
        </div>
      </div>
      <div class="card spruce">
        <div class="img">
          <img src="../images/log.png" style="width: 120px;" alt="Enderman">
        </div>
        <div class="name">
          <h1 class="card-name">Ферма Дерево</h1>
        </div>
      </div>
      <div class="card enderman">
        <div class="img">
          <img src="../images/pearl.webp" style="width: 120px;" alt="Enderman">
        </div>
        <div class="name">
          <h1 class="card-name" style="font-size: 30px;">Ферма Эндерменов</h1>
        </div>
      </div>
      <div class="card cobblestone">
        <div class="img">
          <img src="../images/cobblestone.png" style="width: 120px;" alt="Enderman">
        </div>
        <div class="name">
          <h1 class="card-name" style="font-size: 30px;">Ферма Булыжника</h1>
        </div>
      </div>
      <div class="card gunpowder">
        <div class="img">
          <img src="../images/gunpowder.png" style="width: 120px;" alt="Enderman">
        </div>
        <div class="name">
          <h1 class="card-name" style="font-size: 30px;">Ферма Пороха</h1>
        </div>
      </div>
      <div class="card cane">
        <div class="img">
          <img src="../images/cane.png" style="width: 120px;" alt="Enderman">
        </div>
        <div class="name">
          <h1 class="card-name" style="font-size: 30px;">Ферма Тросника</h1>
        </div>
      </div>
      <div class="card basalt">
        <div class="img">
          <img src="../images/basalt.png" style="width: 120px;" alt="Enderman">
        </div>
        <div class="name">
          <h1 class="card-name" style="font-size: 30px;">Ферма Базальта</h1>
        </div>
      </div>
    </div>
  </div>
  <script src="../scripts/farms.js"></script>
</body>
</html>
