<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CraftShop | Магазин игровых построек">
  <link rel="stylesheet" href="./styles.css">
  <title>CraftShop - Главная</title>
</head>
<body onload="loadingFunc()">
  <div class="loader"></div>
  <div class="container">
    <div class="head">
      <h1 class="name">Craft<span class="purple">Shop</span></h1>
      <h2 class="slogan">Магазин игровых построек</h2>
    </div>
    <div class="categories">
      <div class="card farms">
        <div class="img">
          <img src="./images/enderman.png" alt="Enderman">
        </div>
        <div class="name">
          <h1 class="card-name">Фермы</h1>
        </div>
      </div>
      <div class="card buildings">
        <div class="img">
          <img src="./images/cobblestone.png" style="width: 200px;" alt="Enderman">
        </div>
        <div class="name">
          <h1 class="card-name">Постройки</h1>
        </div>
      </div>
    </div>
  </div>
  <script src="./scripts/script.js"></script>
</body>
</html>
